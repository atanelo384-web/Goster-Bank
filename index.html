<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Goster Bank</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAClsLeNiqXdQh99byMaiSkExz4Yv7JuX4",
  authDomain: "goster-bank.firebaseapp.com",
  projectId: "goster-bank",
  storageBucket: "goster-bank.firebasestorage.app",
  messagingSenderId: "738396926581",
  appId: "1:738396926581:web:816e1a5b22d95514493e3c",
  measurementId: "G-8P479PZGPQ"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        // ========== ПЕРЕВОДЫ ==========
        const translations = {
            ru: {
                app: "Goster Bank", login: "Вход", email: "Email", password: "Пароль",
                login_btn: "Войти", google: "Google", no_acc: "Нет аккаунта?",
                reg: "Регистрация", reg_title: "Регистрация", pass_min: "Пароль (мин. 6)",
                create: "Создать", have_acc: "Уже есть аккаунт?", acc_num: "Счёт",
                balance_go: "GO", balance_yo: "YO", transfer: "Перевод", to: "Кому",
                amount: "Сумма (GO)", limit: "Лимит 5 000 GO", send: "Отправить",
                topup: "Пополнение", bot: "Получить GO → @go_bot", refresh: "Обновить",
                history: "История", income: "Доход", expense: "Расход", logout: "Выйти",
                loading: "Загрузка...", err_id: "Неверный номер счёта", err_amount: "Введите сумму",
                err_limit: "Максимум 5 000 GO", err_funds: "Недостаточно GO",
                err_self: "Нельзя себе", err_user: "Счёт не найден", success: "Переведено {amount} GO",
                sent: "→", received: "←"
            },
            en: {
                app: "Goster Bank", login: "Login", email: "Email", password: "Password",
                login_btn: "Login", google: "Google", no_acc: "No account?",
                reg: "Register", reg_title: "Register", pass_min: "Password (min 6)",
                create: "Create", have_acc: "Have an account?", acc_num: "Account",
                balance_go: "GO", balance_yo: "YO", transfer: "Transfer", to: "To",
                amount: "Amount (GO)", limit: "Limit 5,000 GO", send: "Send",
                topup: "Top up", bot: "Get GO → @go_bot", refresh: "Refresh",
                history: "History", income: "Income", expense: "Expense", logout: "Logout",
                loading: "Loading...", err_id: "Invalid account number", err_amount: "Enter amount",
                err_limit: "Max 5,000 GO", err_funds: "Insufficient GO",
                err_self: "Cannot self transfer", err_user: "Account not found", success: "Sent {amount} GO",
                sent: "→", received: "←"
            }
        };
        
        let lang = localStorage.getItem('lang') || 'ru';
        function t(key, p = {}) { let s = translations[lang][key] || key; Object.keys(p).forEach(k => s = s.replace(`{${k}}`, p[k])); return s; }
        
        window.setLang = function(l) { lang = l; localStorage.setItem('lang', l); updateUI(); };
        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
            document.querySelectorAll('[data-i18n-place]').forEach(el => el.placeholder = t(el.dataset.i18nPlace));
            document.title = t('app');
            if (currentUser) refreshBalance();
        }
        
        // DOM
        const authDiv = document.getElementById('auth');
        const bankDiv = document.getElementById('bank');
        const errDiv = document.getElementById('error');
        const sucDiv = document.getElementById('success');
        const userEmailSpan = document.getElementById('userEmail');
        const userIdSpan = document.getElementById('userId');
        const goSpan = document.getElementById('go');
        const yoSpan = document.getElementById('yo');
        const incomeSpan = document.getElementById('income');
        const expenseSpan = document.getElementById('expense');
        const historyDiv = document.getElementById('historyList');
        const transferId = document.getElementById('transferId');
        const transferAmount = document.getElementById('transferAmount');
        
        let currentUser = null, currentData = null;
        
        function showErr(msg) { errDiv.textContent = msg; errDiv.style.opacity = '1'; setTimeout(() => errDiv.style.opacity = '0', 3000); }
        function showSuc(msg) { sucDiv.textContent = msg; sucDiv.style.opacity = '1'; setTimeout(() => sucDiv.style.opacity = '0', 3000); }
        
        function genId() { return Math.floor(100000 + Math.random() * 900000).toString(); }
        
        async function initUser(user) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if (snap.exists()) return snap.data();
            let uid = genId(), unique = false;
            while (!unique) {
                const check = await getDoc(doc(db, "userIds", uid));
                if (!check.exists()) unique = true;
                else uid = genId();
            }
            const data = { email: user.email, userId: uid, balanceGo: 0, balanceYo: 0, transactions: [], totalIncome: 0, totalExpense: 0 };
            await setDoc(ref, data);
            await setDoc(doc(db, "userIds", uid), { uid: user.uid });
            return data;
        }
        
        async function loadUser(user) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if (snap.exists()) currentData = snap.data();
            else currentData = await initUser(user);
            goSpan.textContent = currentData.balanceGo;
            yoSpan.textContent = currentData.balanceYo;
            userIdSpan.textContent = currentData.userId;
            incomeSpan.textContent = currentData.totalIncome || 0;
            expenseSpan.textContent = currentData.totalExpense || 0;
            renderHistory();
        }
        
        async function refreshBalance() {
            if (!currentUser) return;
            const ref = doc(db, "users", currentUser.uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                currentData = snap.data();
                goSpan.textContent = currentData.balanceGo;
                yoSpan.textContent = currentData.balanceYo;
                incomeSpan.textContent = currentData.totalIncome || 0;
                expenseSpan.textContent = currentData.totalExpense || 0;
            }
        }
        
        function renderHistory() {
            if (!currentData?.transactions) { historyDiv.innerHTML = `<div class="empty">${t('loading')}</div>`; return; }
            if (currentData.transactions.length === 0) { historyDiv.innerHTML = `<div class="empty">—</div>`; return; }
            historyDiv.innerHTML = '';
            [...currentData.transactions].reverse().slice(0, 15).forEach(tx => {
                const d = new Date(tx.date).toLocaleString(lang === 'ru' ? 'ru-RU' : 'en-US');
                const cls = tx.type === 'sent' ? 'minus' : 'plus';
                const sign = tx.type === 'sent' ? `- ${tx.amount}` : `+ ${tx.amount}`;
                const title = tx.type === 'sent' ? `${t('sent')} ${tx.toUserId}` : `${t('received')} ${tx.fromUserId}`;
                historyDiv.innerHTML += `<div class="history-item"><div><div class="hist-title">${title}</div><div class="hist-date">${d}</div></div><div class="${cls}">${sign} GO</div></div>`;
            });
        }
        
        window.send = async function() {
            if (!currentUser) return;
            const to = transferId.value.trim();
            const amt = parseFloat(transferAmount.value);
            if (!to || to.length !== 6) { showErr(t('err_id')); return; }
            if (isNaN(amt) || amt <= 0) { showErr(t('err_amount')); return; }
            if (amt > 5000) { showErr(t('err_limit')); return; }
            if (amt > currentData.balanceGo) { showErr(t('err_funds')); return; }
            if (to === currentData.userId) { showErr(t('err_self')); return; }
            try {
                const refTo = doc(db, "userIds", to);
                const snapTo = await getDoc(refTo);
                if (!snapTo.exists()) { showErr(t('err_user')); return; }
                const recipientUid = snapTo.data().uid;
                await runTransaction(db, async (tr) => {
                    const sRef = doc(db, "users", currentUser.uid);
                    const rRef = doc(db, "users", recipientUid);
                    const sDoc = await tr.get(sRef);
                    const rDoc = await tr.get(rRef);
                    if (!sDoc.exists() || !rDoc.exists()) throw new Error(t('err_user'));
                    const newS = sDoc.data().balanceGo - amt;
                    if (newS < 0) throw new Error(t('err_funds'));
                    tr.update(sRef, { balanceGo: newS, transactions: [...(sDoc.data().transactions || []), { amount: amt, date: new Date().toISOString(), type: 'sent', toUserId: to }], totalExpense: (sDoc.data().totalExpense || 0) + amt });
                    tr.update(rRef, { balanceGo: rDoc.data().balanceGo + amt, transactions: [...(rDoc.data().transactions || []), { amount: amt, date: new Date().toISOString(), type: 'received', fromUserId: currentData.userId }], totalIncome: (rDoc.data().totalIncome || 0) + amt });
                });
                await loadUser(currentUser);
                transferId.value = ''; transferAmount.value = '';
                showSuc(t('success', { amount: amt }));
            } catch(e) { showErr(e.message); }
        };
        
        window.getGo = () => { window.open('https://t.me/go_bot', '_blank'); alert(t('bot')); };
        window.refreshUI = async () => { await refreshBalance(); renderHistory(); showSuc(t('refresh')); };
        window.logout = () => auth.signOut();
        
        // Аутентификация
        function showLogin() { document.getElementById('loginPanel').style.display = 'block'; document.getElementById('registerPanel').style.display = 'none'; }
        function showReg() { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('registerPanel').style.display = 'block'; }
        window.registerEmail = async () => {
            const e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value;
            if (!e || !p) { showErr(t('err_amount')); return; }
            if (p.length < 6) { showErr(t('pass_min')); return; }
            try { await createUserWithEmailAndPassword(auth, e, p); } catch(e) { showErr(e.message); }
        };
        window.loginEmail = async () => {
            const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPass').value;
            if (!e || !p) { showErr(t('err_amount')); return; }
            try { await signInWithEmailAndPassword(auth, e, p); } catch(e) { showErr(e.message); }
        };
        window.loginGoogle = async () => { try { await signInWithPopup(auth, provider); } catch(e) { showErr(e.message); } };
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await initUser(user);
                await loadUser(user);
                authDiv.style.display = 'none';
                bankDiv.style.display = 'block';
                userEmailSpan.textContent = user.email;
                updateUI();
            } else {
                currentUser = null;
                authDiv.style.display = 'flex';
                bankDiv.style.display = 'none';
                showLogin();
                updateUI();
            }
        });
        
        window.onload = () => { showLogin(); setLang(localStorage.getItem('lang') || 'ru'); };
        window.showLogin = showLogin; window.showReg = showReg;
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        }
        
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        
        /* ПК версия — широкая сетка */
        .bank-grid {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }
        
        .bank-grid .full-width {
            grid-column: 1 / -1;
        }
        
        /* Общие карточки */
        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 32px;
            padding: 28px;
            transition: 0.2s;
        }
        
        .card-sm {
            padding: 20px;
        }
        
        /* Авторизация — по центру */
        .auth-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* Текст */
        .logo {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: white;
            margin-bottom: 6px;
        }
        
        .sub {
            color: #444;
            font-size: 13px;
            margin-bottom: 32px;
            border-left: 2px solid #222;
            padding-left: 12px;
        }
        
        .balance-large {
            font-size: 48px;
            font-weight: 600;
            color: white;
            line-height: 1;
        }
        
        .balance-large small {
            font-size: 18px;
            color: #555;
            font-weight: 400;
        }
        
        .balance-label {
            font-size: 12px;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 600;
            color: white;
        }
        
        /* Поля ввода */
        input {
            width: 100%;
            background: #000000;
            border: 1px solid #222;
            padding: 14px 18px;
            border-radius: 48px;
            font-size: 15px;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        
        input:focus {
            border-color: #ffffff30;
        }
        
        /* Кнопки */
        button {
            width: 100%;
            background: #ffffff;
            border: none;
            padding: 12px 18px;
            border-radius: 48px;
            font-size: 15px;
            font-weight: 500;
            color: #000000;
            cursor: pointer;
            transition: 0.15s;
        }
        
        button:active { transform: scale(0.97); }
        
        .btn-dark {
            background: #111;
            color: #ddd;
            border: 1px solid #222;
        }
        
        .btn-danger {
            background: #1a0000;
            color: #ff5555;
            border: 1px solid #330000;
        }
        
        .btn-telegram {
            background: #1d2a3a;
            color: white;
            border: 1px solid #2f4b70;
        }
        
        /* История */
        .history-list {
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .history-item {
            background: #050505;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #141414;
        }
        
        .hist-title {
            font-size: 13px;
            color: #ccc;
        }
        
        .hist-date {
            font-size: 10px;
            color: #444;
            margin-top: 4px;
        }
        
        .plus { color: #00c853; font-weight: 600; }
        .minus { color: #ff4444; font-weight: 600; }
        .empty { text-align: center; color: #333; padding: 32px; font-size: 14px; }
        
        /* Двойной баланс */
        .balance-row {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
        }
        
        .balance-item {
            flex: 1;
        }
        
        /* Строка статистики */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        
        .stats-row .stat-card {
            flex: 1;
            background: #050505;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
        }
        
        hr {
            border-color: #1a1a1a;
            margin: 20px 0;
        }
        
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .lang-btn {
            width: auto;
            background: transparent;
            color: #666;
            padding: 6px 14px;
            font-size: 12px;
            margin: 0;
        }
        
        .error, .success {
            padding: 12px;
            border-radius: 48px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 20px;
            opacity: 0;
            transition: 0.2s;
        }
        .error { background: #1a0000; color: #ff8888; border: 1px solid #330000; }
        .success { background: #003300; color: #88ff88; border: 1px solid #008800; }
        
        .link {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
        }
        .link span {
            color: white;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .limit-hint {
            font-size: 11px;
            color: #ffaa33;
            text-align: center;
            margin-top: 8px;
        }
        
        @media (max-width: 900px) {
            body { padding: 20px 16px; }
            .bank-grid { grid-template-columns: 1fr; gap: 16px; }
            .balance-large { font-size: 36px; }
        }
    </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth" class="auth-container" style="display: flex; flex-direction: column;">
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('ru')">РУС</button>
        <button class="lang-btn" onclick="setLang('en')">ENG</button>
    </div>
    <div class="logo" data-i18n="app">Goster Bank</div>
    <div class="sub">минимализм • твой счёт</div>
    
    <div id="error" class="error"></div>
    
    <div id="loginPanel" class="card">
        <div style="font-size: 20px; margin-bottom: 24px;" data-i18n="login">Вход</div>
        <input type="email" id="loginEmail" data-i18n-place="email" placeholder="Email" style="margin-bottom: 16px;">
        <input type="password" id="loginPass" data-i18n-place="password" placeholder="Пароль" style="margin-bottom: 24px;">
        <button onclick="loginEmail()" data-i18n="login_btn">Войти</button>
        <button onclick="loginGoogle()" class="btn-dark" style="margin-top: 8px;" data-i18n="google">Google</button>
        <div class="link"><span data-i18n="no_acc">Нет аккаунта?</span> <span onclick="showReg()" data-i18n="reg">Регистрация</span></div>
    </div>
    
    <div id="registerPanel" class="card" style="display: none;">
        <div style="font-size: 20px; margin-bottom: 24px;" data-i18n="reg_title">Регистрация</div>
        <input type="email" id="regEmail" data-i18n-place="email" placeholder="Email" style="margin-bottom: 16px;">
        <input type="password" id="regPass" data-i18n-place="pass_min" placeholder="Пароль (мин. 6)" style="margin-bottom: 24px;">
        <button onclick="registerEmail()" data-i18n="create">Создать</button>
        <button onclick="loginGoogle()" class="btn-dark" style="margin-top: 8px;" data-i18n="google">Google</button>
        <div class="link"><span data-i18n="have_acc">Уже есть аккаунт?</span> <span onclick="showLogin()" data-i18n="login">Войти</span></div>
    </div>
</div>

<!-- БАНК (ПК версия — сетка 2 колонки) -->
<div id="bank" style="display: none;">
    <div class="bank-grid">
        <!-- Левая колонка: профиль + баланс + перевод -->
        <div>
            <div class="lang-switch" style="margin-bottom: 16px;">
                <button class="lang-btn" onclick="setLang('ru')">РУС</button>
                <button class="lang-btn" onclick="setLang('en')">ENG</button>
            </div>
            <div class="card" style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                    <span class="balance-label" data-i18n="acc_num">Счёт</span>
                    <span style="font-family: monospace; color: #aaa;" id="userId">—</span>
                </div>
                <div style="font-size: 13px; color: #666; margin-bottom: 20px;" id="userEmail">—</div>
                <div class="balance-row">
                    <div class="balance-item">
                        <div class="balance-label" data-i18n="balance_go">GO</div>
                        <div class="balance-large"><span id="go">0</span> <small>GO</small></div>
                    </div>
                    <div class="balance-item">
                        <div class="balance-label" data-i18n="balance_yo">YO</div>
                        <div class="balance-large"><span id="yo">0</span> <small>YO</small></div>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat-card"><div class="balance-label" data-i18n="income">Доход</div><div class="stat-number" id="income">0</div></div>
                    <div class="stat-card"><div class="balance-label" data-i18n="expense">Расход</div><div class="stat-number" id="expense">0</div></div>
                </div>
            </div>
            
            <div class="card">
                <div style="font-weight: 500; margin-bottom: 20px;" data-i18n="transfer">Перевод</div>
                <input type="text" id="transferId" data-i18n-place="to" placeholder="Кому (6 цифр)" style="margin-bottom: 12px;">
                <input type="number" id="transferAmount" data-i18n-place="amount" placeholder="Сумма (GO)" style="margin-bottom: 8px;">
                <div class="limit-hint" data-i18n="limit">Лимит 5 000 GO</div>
                <button onclick="send()" style="margin-top: 16px;" data-i18n="send">Отправить</button>
            </div>
        </div>
        
        <!-- Правая колонка: пополнение + история -->
        <div>
            <div class="card" style="margin-bottom: 20px;">
                <div style="font-weight: 500; margin-bottom: 16px;" data-i18n="topup">Пополнение</div>
                <button class="btn-telegram" onclick="getGo()" data-i18n="bot">Получить GO → @go_bot</button>
                <button onclick="refreshUI()" class="btn-dark" style="margin-top: 10px;" data-i18n="refresh">Обновить баланс</button>
            </div>
            
            <div class="card">
                <div style="font-weight: 500; margin-bottom: 16px;" data-i18n="history">История</div>
                <div id="historyList" class="history-list"><div class="empty">—</div></div>
            </div>
            
            <button onclick="logout()" class="btn-danger" style="margin-top: 8px;" data-i18n="logout">Выйти</button>
            <div style="font-size: 10px; color: #1f1f1f; text-align: center; margin-top: 20px;">Goster Bank • без бонусов</div>
        </div>
        
        <div id="success" class="success full-width" style="margin-top: 8px;"></div>
        <div id="error" class="error full-width"></div>
    </div>
</div>

</body>
</html>
